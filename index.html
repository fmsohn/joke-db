<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#050505">
  <meta name="version" content="2.3.9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="StageTime">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>StageTime</title>
  
  <!-- Asset v101 — cache-bust with ASSET_VERSION + sw.js CACHE_NAME -->
  <link rel="icon" type="image/png" href="/static/icons/AppIcon.png?v=101">
  <link rel="apple-touch-icon" href="/static/icons/AppIcon.png?v=101">
  <link rel="manifest" href="/manifest.json?v=101">
  
  <script>var ASSET_VERSION = "101";</script>
  <link rel="stylesheet" href="/static/css/variables.css?v=101">
  <link rel="stylesheet" href="/static/css/workstation.css?v=101">

  <script>
    if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</head>
<body>
  <nav id="nav-command-pill">
    <button type="button" class="nav-pill-btn" data-nav-panel="home" onclick="window.goHome()">🏠</button>
    <button type="button" class="nav-pill-btn" data-nav-panel="ideas" onclick="window.showPanel('ideas', true)">💡</button>
    <button type="button" class="nav-pill-btn" data-nav-panel="jokes" onclick="window.showPanel('jokes', true)">J</button>
    <button type="button" class="nav-pill-btn" data-nav-panel="sets" onclick="window.showPanel('sets', true)">S</button>
    <button type="button" class="nav-pill-btn" data-nav-panel="settings" onclick="window.showPanel('settings')">⋮</button>
  </nav>

  <div id="app-shell">
    <div id="panel-home">
      <div id="home-hub-v101">
        <img src="/static/icons/logo.png" alt="StageTime" class="workstation-logo" width="400" height="400">
        <div class="stats-container" aria-label="Library overview">
          <div class="stat-tile" data-stat="jokes"><span class="stat-value" id="dash-stat-jokes">0</span><span class="stat-label">Jokes</span></div>
          <div class="stat-tile" data-stat="runtime"><span class="stat-value" id="dash-stat-runtime">00:00</span><span class="stat-label">Runtime</span></div>
          <div class="stat-tile" data-stat="ideas"><span class="stat-value" id="dash-stat-ideas">0</span><span class="stat-label">Ideas</span></div>
          <div class="stat-tile" data-stat="sets"><span class="stat-value" id="dash-stat-sets">0</span><span class="stat-label">Sets</span></div>
        </div>
        <div id="status-slicer" class="status-slicer" role="toolbar" aria-label="Dashboard joke filter">
          <button type="button" class="slicer-pill active" data-status="all">ALL</button>
          <button type="button" class="slicer-pill" data-status="active">ACTIVE</button>
          <button type="button" class="slicer-pill" data-status="draft">DRAFT</button>
        </div>
      </div>
      <div id="drawer-grid">
        <button type="button" class="hub-drawer" data-folder="ideas">Ideas</button>
        <button type="button" class="hub-drawer" data-folder="jokes">Jokes</button>
        <button type="button" class="hub-drawer" data-folder="sets">Sets</button>
        <button type="button" class="hub-drawer" data-folder="settings">Settings</button>
      </div>
    </div>

    <main id="main-content">
      <!-- IDEAS PANEL -->
      <section id="panel-ideas" class="panel folder-layer hidden" data-folder="ideas">
        <div class="panel-topbar panel-topbar-title-only">
          <h2 class="panel-title">Ideas</h2>
        </div>
        <div id="ideas-workstation" class="panel-body">
          <div id="panel-ideas-list">
            <input type="text" id="idea-search-input" placeholder="Search ideas..." class="search-bar">
            <div id="quick-add-row" class="quick-add-row">
              <input type="text" id="new-idea-title-input" placeholder="Quick idea..." maxlength="500">
              <button type="button" id="create-idea-btn" class="slab-button">Add</button>
            </div>
            <ul id="idea-list"></ul>
          </div>
          <div id="idea-detail" class="hidden"></div>
        </div>
      </section>

      <!-- JOKES PANEL -->
      <section id="panel-jokes" class="panel folder-layer hidden" data-folder="jokes">
        <div class="panel-topbar panel-topbar-title-only">
          <h2 class="panel-title jokes-panel-title-static" id="jokes-panel-title-display">Jokes</h2>
          <input type="text" id="joke-edit-title" class="panel-title jokes-panel-title-input hidden" maxlength="500" autocomplete="off" aria-label="Joke title">
        </div>
        <div class="panel-body">
          <div id="panel-jokes-list">
            <div id="ws-joke-input" class="quick-add-row">
              <input type="text" id="new-joke-title-input" placeholder="Quick joke title..." maxlength="200">
              <button type="button" id="create-joke-btn" class="slab-button">Add</button>
            </div>
            <div id="ws-jokes-list-header">
              <div id="jokes-toolbar">
                <select id="joke-filter-status" class="workstation-select">
                  <option value="">All Statuses</option>
                  <option value="draft">Draft</option>
                  <option value="active">Active</option>
                  <option value="retired">Retired</option>
                </select>
              </div>
            </div>
            <ul id="joke-list"></ul>
          </div>
          <div id="jokes-detail-container" class="hidden"></div>
        </div>
      </section>

      <!-- SETS PANEL -->
      <section id="panel-sets" class="panel folder-layer hidden" data-folder="sets">
        <div class="panel-topbar panel-topbar-title-only">
          <h2 class="panel-title">Sets</h2>
        </div>
        <div class="panel-body">
          <div id="panel-sets-list">
            <div id="sets-new-form" class="quick-add-row">
              <input type="text" id="new-set-title-input" placeholder="New set title..." maxlength="100">
              <button type="button" id="create-set-btn" class="slab-button">Create</button>
            </div>
            <ul id="set-list"></ul>
          </div>
        </div>
      </section>
      <section id="set-detail" class="panel folder-layer hidden"></section>

      <!-- SETTINGS PANEL -->
      <section id="panel-settings" class="panel folder-layer hidden" data-folder="settings">
        <div class="panel-topbar panel-topbar-title-only">
          <h2 class="panel-title">Settings</h2>
        </div>
        <div class="panel-body setting-controls">
          <label class="settings-accent-label" for="settings-accent-color">Accent color</label>
          <input type="color" id="settings-accent-color" class="settings-accent-swatch" value="#00f2ff" title="Accent color" aria-label="Accent color">
          <div class="backup-actions">
            <button type="button" class="slab-button" onclick="window.exportDatabase()">EXPORT BACKUP</button>
            <button type="button" class="slab-button" onclick="window.triggerImport()">IMPORT BACKUP</button>
          </div>
          <input type="file" id="import-input" class="hidden" accept=".json" aria-label="Import backup JSON file">
        </div>
      </section>
    </main>
  </div>

  <div id="set-picker-modal" class="hidden" role="dialog" aria-modal="true" aria-label="Select a set">
    <div id="set-picker-overlay" aria-hidden="true"></div>
    <div class="workstation-card workstation-picker-panel">
      <h3 class="workstation-picker-title">Select a Set</h3>
      <div id="set-options-list" class="set-options-list"></div>
      <button type="button" id="set-picker-close-btn" class="btn-primary btn-lift set-picker-close">Close</button>
    </div>
  </div>

  <script src="/static/js/dexie.min.js?v=101"></script>
  <script src="/static/js/db.js?v=101"></script>
  <script src="/static/js/app.js?v=101"></script>
</body>
</html>
